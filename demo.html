<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zephyr WASM - Bundled Demo</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card {
            background: white;
            padding: 2rem;
            margin: 1rem 0;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 1rem;
        }
        .loading {
            background: white;
            padding: 2rem;
            text-align: center;
            border-radius: 12px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Component styles */
        .counter-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: all 0.2s;
            min-width: 50px;
        }
        .btn:hover {
            background: #5568d3;
            transform: scale(1.05);
        }
        .counter-value {
            font-size: 2rem;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }
        .toggle {
            padding: 1rem 2rem;
            border: 2px solid #ddd;
            border-radius: 50px;
            background: white;
            cursor: pointer;
            font-weight: 600;
        }
        .toggle.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
<h1>💎 Zephyr WASM - Bundled Demo</h1>

<div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Initializing Ruby WebAssembly...</p>
    <small>This may take a few seconds</small>
</div>

<div id="content" style="display: none;">
    <div class="card">
        <h2>Counter Component</h2>
        <x-counter initial="0"></x-counter>
    </div>

    <div class="card">
        <h2>Toggle Component</h2>
        <x-toggle label="Dark Mode"></x-toggle>
    </div>
</div>

<!-- Load ruby.wasm from CDN (using unpkg for better MIME type support) -->
<script src="https://cdn.jsdelivr.net/npm/@ruby/3.4-wasm-wasi@2.7.1/dist/browser.script.iife.js"></script>

<!-- All Ruby code bundled inline -->
<script type="text/ruby" data-eval="async">
    require 'js'

    puts "🚀 Starting Zephyr WASM..."

    # Registry
    module ZephyrWasm
      module Registry
        class << self
          def components
            @components ||= {}
          end

          def register(tag_name, component_class)
            components[tag_name] = component_class
          end

          def get(tag_name)
            components[tag_name]
          end
        end
      end
    end

    # DOMBuilder
    module ZephyrWasm
      class DOMBuilder
        attr_reader :root, :current

        def initialize(root)
          @root = root
          @current = root
          @elements = []
        end

        def method_missing(method_name, *args, **attrs, &block)
          tag(method_name.to_s, *args, **attrs, &block)
        end

        def tag(name, *args, **attrs, &block)
          element = JS.global[:document].call(:createElement, name)

          attrs.each do |key, value|
            next if value.nil?

            if key.to_s.start_with?('on_')
              event_name = key.to_s.sub('on_', '')
              element.call(:addEventListener, event_name, value.to_js)
            elsif key == :class
              element[:className] = value.to_s
            else
              element.call(:setAttribute, key.to_s, value.to_s)
            end
          end

          if args.any?
            element[:textContent] = args.first.to_s
          end

          if block
            old_current = @current
            @current = element
            instance_eval(&block)
            @current = old_current
          end

          @elements << element
          @current.call(:appendChild, element)
          element
        end

        def text(content)
          text_node = JS.global[:document].call(:createTextNode, content.to_s)
          @current.call(:appendChild, text_node)
          text_node
        end

        def apply
          @root[:innerHTML] = ''
          @elements.each { |el| @root.call(:appendChild, el) }
        end
      end
    end

    # Component Base Class
    module ZephyrWasm
      class Component
        class << self
          attr_accessor :tag_name
          attr_reader :observed_attrs

          def inherited(subclass)
            super
            subclass.instance_variable_set(:@observed_attrs, [])
          end

          def observed_attributes(*attrs)
            @observed_attrs ||= []
            @observed_attrs.concat(attrs.map(&:to_s))
          end

          def on_connect(&block)
            define_method(:on_connect_impl, &block)
          end

          def template(&block)
            define_method(:template_impl, &block)
          end
        end

        attr_reader :element, :state

        def initialize(element)
          @element = element
          @state = {}
        end

        def connected
          on_connect_impl if respond_to?(:on_connect_impl)
        end

        def render
          return unless respond_to?(:template_impl)
          builder = DOMBuilder.new(@element)
          builder.instance_eval(&method(:template_impl))
          builder.apply
        end

        def set_state(key, value)
          @state[key] = value
          render
        end

        def [](key)
          @element.call(:getAttribute, key.to_s)&.to_s
        end
      end
    end

    # Main Framework
    module ZephyrWasm
      class << self
        def component(tag_name, &block)
          component_class = Class.new(Component)
          component_class.tag_name = tag_name
          component_class.class_eval(&block) if block_given?

          Registry.register(tag_name, component_class)
          define_custom_element(tag_name, component_class)

          component_class
        end

        def define_custom_element(tag_name, component_class)
          JS.eval(<<~JS)
            (function() {
              class RubyComponent extends HTMLElement {
                connectedCallback() {
                  if (window.ZephyrWasm && window.ZephyrWasm.initComponent) {
                    window.ZephyrWasm.initComponent(this, '#{tag_name}');
                  }
                }
              }
              customElements.define('#{tag_name}', RubyComponent);
            })()
          JS
        end

        def init_component(element, tag_name)
          component_class = Registry.get(tag_name)
          return unless component_class

          instance = component_class.new(element)
          element[:_rubyInstance] = instance
          instance.connected
          instance.render
        end
      end
    end

    # Expose to JavaScript
    JS.global[:ZephyrWasm] = {
      initComponent: ->(element, tag_name) {
        ZephyrWasm.init_component(element, tag_name.to_s)
      }
    }.to_js

    # Define Components
    ZephyrWasm.component('x-counter') do
      observed_attributes :initial

      on_connect do
        count = (self['initial'] || '0').to_i
        set_state(:count, count)
      end

      template do
        div(class: 'counter-container') do
          button(
            class: 'btn',
            on_click: ->(_) {
              set_state(:count, state[:count] - 1)
            }
          ) do
            text('-')
          end

          span(class: 'counter-value') do
            text(state[:count])
          end

          button(
            class: 'btn',
            on_click: ->(_) {
              set_state(:count, state[:count] + 1)
            }
          ) do
            text('+')
          end
        end
      end
    end

    ZephyrWasm.component('x-toggle') do
      observed_attributes :label

      on_connect do
        set_state(:checked, false)
      end

      template do
        button(
          class: state[:checked] ? 'toggle active' : 'toggle',
          on_click: ->(_) {
            set_state(:checked, !state[:checked])
          }
        ) do
          text(self['label'] || 'Toggle')
        end
      end
    end

    puts "✅ Zephyr WASM loaded!"
    puts "📦 Components: #{ZephyrWasm::Registry.components.keys.join(', ')}"

    # Signal ready
    JS.global[:document].call(:dispatchEvent,
      JS.global[:CustomEvent].new('zephyr-ready')
    )
</script>

<script>
    document.addEventListener('zephyr-ready', () => {
        console.log('✅ Ruby WASM ready!');
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
    });

    setTimeout(() => {
        const loading = document.getElementById('loading');
        if (loading.style.display !== 'none') {
            loading.innerHTML += '<p style="color: red; margin-top: 1rem;">⚠️ Loading is taking longer than expected. Check console for errors.</p>';
        }
    }, 10000);
</script>
</body>
</html>
